							// Load the raw anonymous data:
							var dataUrl = 'https://raw.githubusercontent.com/mgrigajtis/mgrigajtis.github.io/master/citrus/data/data.json';
							var xmlhttp = new XMLHttpRequest();

							xmlhttp.onreadystatechange = function() {
									if (xmlhttp.readyState === 4) {
										switch(xmlhttp.status) {
											case 200:
												var data = JSON.parse(xmlhttp.responseText);

												postMessage(data);
												break;
											default:
												postMessage('');
												break;
										}
									}
							};

							xmlhttp.open('GET', dataUrl, true);
							xmlhttp.send();
						}
					});
				}

										case 'F':

											males++;
											break;
										default:

											break;
										case 'Hispanic':

											break;

									colors.push('pink');

									labels.push('Unknown');
									values.push(totals.unkownGenders);
									colors.push('yellow');

			              values: values

				var sticky = navbar.offsetTop;
